name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:

  # ─── Android ───────────────────────────────────
  build-android:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./shakawa_front
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: stable
      - run: flutter pub get
      - run: flutter build apk --release
      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: shakawa_front/build/app/outputs/flutter-apk/app-release.apk

  # ─── Windows ───────────────────────────────────
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: ./shakawa_front
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: stable
      - run: flutter pub get
      - run: flutter build windows --release
      - name: Zip the build
        run: Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath windows-release.zip
      - uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: shakawa_front/windows-release.zip

  # ─── Linux ─────────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./shakawa_front
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev
        working-directory: .
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: stable
      - run: flutter pub get
      - run: flutter build linux --release
      - name: Zip the build
        run: zip -r linux-release.zip build/linux/x64/release/bundle/
      - uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: shakawa_front/linux-release.zip

  # ─── macOS ─────────────────────────────────────
  build-macos:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: ./shakawa_front
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: stable
      - run: flutter pub get
      - run: flutter build macos --release
      - name: Zip the build
        run: zip -r macos-release.zip build/macos/Build/Products/Release/
      - uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: shakawa_front/macos-release.zip

  # ─── GitHub Release ────────────────────────────
  release:
    needs: [build-android, build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**
          generate_release_notes: true