name: Production Release

on:
  push:
    tags:
      - 'v*' # هيشتغل لما تعمل tag جديد زي v1.0.0

jobs:
  build-all:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        working-directory: ./shakawa_front
        run: flutter pub get

      - name: Build Platform
        working-directory: ./shakawa_front
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            flutter build windows --release
          else
            flutter build macos --release
          fi
        shell: bash

      - name: Release Apps
        uses: softprops/action-gh-release@v1
        with:
          files: |
            shakawa_front/build/windows/x64/runner/Release/*
            shakawa_front/build/macos/Build/Products/Release/*.app
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}